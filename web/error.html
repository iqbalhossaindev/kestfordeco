<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KestFord Project Error</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: Arial, Helvetica, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; }
    .wrap { width: min(420px, 88vw); text-align: center; }
    .code { font-size: 13px; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.42); margin-bottom: 16px; }
    .title { font-size: clamp(28px, 5vw, 44px); font-weight: 700; letter-spacing: .08em; margin-bottom: 14px; }
    .text { font-size: 14px; color: rgba(255,255,255,.62); line-height: 1.7; margin-bottom: 22px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-width: 150px; height: 42px; padding: 0 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14); color: #fff; text-decoration: none; background: rgba(255,255,255,.06); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">System Error</div>
    <div class="title">Unable to Open Project</div>
    <div class="text">The requested KestFord Project page could not be loaded. Please return to the project home and try again.</div>
    <a class="btn" href="./">Return to Project</a>
  </div>
</body>
</html>
